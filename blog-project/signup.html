<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Campus Compass</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;650;750;800&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css?v=6">
</head>
<body>
  <header class="site-header"><nav class="navbar container"><a class="logo" href="index.html"><span class="logo-mark">C</span> Campus Compass</a><button class="hamburger" id="hamburger" aria-label="Open navigation"><i class="fa-solid fa-bars"></i></button><div class="nav-links" id="navLinks"></div></nav></header>
  <main class="auth-shell cinematic-auth">
    <section class="auth-panel auth-panel-wide">
    <aside class="auth-copy">
      <p class="eyebrow">Join the network</p>
      <h1>Build a useful campus profile.</h1>
      <p class="lead">Your bio and area help readers understand why your guides are relevant.</p>
    </aside>
    <form class="form-card narrow" id="signupForm" novalidate>
      <p class="eyebrow">Start writing</p>
      <h1>Sign up</h1>
      <div class="field"><label for="fullName">Full Name</label><input id="fullName" type="text"></div>
      <div class="field"><label for="email">Email</label><input id="email" type="email"></div>
      <div class="field"><label for="bio">Short Bio</label><input id="bio" type="text" placeholder="Example: CSE student sharing placement notes"></div>
      <div class="field">
        <label for="expertise">Primary Area</label>
        <select id="expertise">
          <option value="">Choose one</option>
          <option>Placements</option>
          <option>Projects</option>
          <option>Exams</option>
          <option>Campus Life</option>
          <option>Events</option>
          <option>Tech Tutorials</option>
          <option>Travel</option>
          <option>Opinion</option>
        </select>
      </div>
      <div class="field"><label for="password">Password</label><input id="password" type="password"></div>
      <div class="field"><label for="confirmPassword">Confirm Password</label><input id="confirmPassword" type="password"></div>
      <p class="error" id="signupError"></p>
      <p class="success-message" id="signupSuccess"></p>
      <button class="btn btn-primary" type="submit">Create Account</button>
      <p style="margin-top:18px;">Already registered? <a class="category-pill" href="login.html">Login</a></p>
    </form>
    </section>
  </main>
  <script src="js/main.js"></script>
</body>
</html>
