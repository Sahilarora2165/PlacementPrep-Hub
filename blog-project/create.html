<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Write a Guide | PlacementPrep Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&family=Fraunces:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <nav class="navbar container">
    <a class="logo" href="index.html"><span class="logo-mark">PP</span> PlacementPrep</a>
    <button class="hamburger" id="hamburger" aria-label="Open menu"><i class="fa-solid fa-bars"></i></button>
    <div class="nav-links" id="navLinks"></div>
  </nav>
</header>

<main>
  <section class="page-hero">
    <div class="container page-hero-inner">
      <span class="eyebrow">Writer Studio</span>
      <h1 style="margin-top:12px">Share your placement experience</h1>
      <p class="lead">Write a guide that helps the next batch avoid the mistakes you made. It autosaves as you type.</p>
    </div>
  </section>

  <section class="section" style="padding-top:48px">
    <div class="container narrow">
      <form class="form-card" id="createForm" novalidate>
        <div class="field">
          <label>Guide Title</label>
          <input id="title" type="text" placeholder="e.g. How I cracked TCS NQT with 2 weeks of prep">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="field">
            <label>Category</label>
            <select id="category">
              <option value="">Choose category</option>
              <option>DSA & Coding</option>
              <option>Resume & Profile</option>
              <option>System Design</option>
              <option>Core Subjects</option>
              <option>Interview Prep</option>
              <option>Internships</option>
              <option>CGPA & Academics</option>
              <option>Off-Campus</option>
            </select>
          </div>
          <div class="field">
            <label>Cover Image URL <span style="color:var(--muted)">(optional)</span></label>
            <input id="coverImage" type="url" placeholder="https://images.unsplash.com/...">
          </div>
        </div>
        <div class="field">
          <label>Content</label>
          <textarea id="content" placeholder="Write your placement guide here. Be specific — share exact resources, timelines, and what actually worked..." style="min-height:320px"></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="field">
            <label>Video URL <span style="color:var(--muted)">(optional .mp4 link)</span></label>
            <input id="videoUrl" type="url" placeholder="https://example.com/guide.mp4">
          </div>
          <div class="field">
            <label>YouTube Embed URL <span style="color:var(--muted)">(optional)</span></label>
            <input id="youtubeUrl" type="url" placeholder="https://www.youtube.com/embed/...">
          </div>
        </div>

        <div style="display:flex;gap:16px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
          <span id="postMetrics" style="font-family:var(--mono);font-size:0.78rem;color:var(--muted)">0 words · 1 min read</span>
          <span id="draftStatus" style="font-size:0.78rem;color:var(--muted)">No draft</span>
        </div>

        <p class="error" id="createError"></p>
        <p class="success-message" id="createToast"></p>

        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-primary" type="submit"><i class="fa-solid fa-paper-plane"></i> Publish Guide</button>
          <a class="btn btn-secondary btn-sm" href="dashboard.html">Cancel</a>
        </div>
      </form>
    </div>
  </section>
</main>

<div class="toast" id="globalToast"></div>

<footer class="site-footer">
  <div class="container footer-grid">
    <div class="logo"><span class="logo-mark">PP</span> PlacementPrep Hub</div>
    <div class="footer-links"><a href="blog.html">Guides</a><a href="dashboard.html">Dashboard</a></div>
    <div class="footer-copy">Built for CS students</div>
  </div>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
